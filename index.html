<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BMW E36" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>BMW E36 — Baza de cunoștințe</title>
  <style>
    :root {
      --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#22223b;
      --border:rgba(255,255,255,0.08);--text:#f0f0f5;--muted:#8888aa;
      --accent:#4f6ef7;--accent2:#7c5cbf;--danger:#e24b4a;
      --radius:14px;--radius-sm:8px;
    }
    :root.light {
      --bg:#f4f4f8;--surface:#ffffff;--surface2:#eaeaf0;
      --border:rgba(0,0,0,0.09);--text:#111122;--muted:#666688;
      --accent:#3355dd;--accent2:#6633aa;--danger:#cc2222;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
    .app{display:flex;flex-direction:column;height:100dvh;}
    .header{background:var(--surface);padding:env(safe-area-inset-top,12px) 16px 0;border-bottom:0.5px solid var(--border);flex-shrink:0;}
    .header-inner{display:flex;align-items:center;gap:12px;padding-top:6px;padding-bottom:12px;}
    .logo{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;}
    .logo img{width:100%;height:100%;object-fit:cover;}
    .header-text h1{font-size:17px;font-weight:700;}
    .header-text p{font-size:11px;color:var(--muted);margin-top:1px;}
    .header-btns{margin-left:auto;display:flex;gap:8px;align-items:center;}
    .icon-btn{background:var(--surface2);border:0.5px solid var(--border);border-radius:999px;padding:7px 11px;font-size:17px;cursor:pointer;line-height:1;color:var(--text);}
    .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(72px + env(safe-area-inset-bottom,0px));}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100;}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 8px;border:none;background:none;color:var(--muted);font-size:11px;cursor:pointer;}
    .nav-btn.active{color:var(--accent);}
    .nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .panel{display:none;}.panel.active{display:block;}
    .search-wrap{position:relative;margin-bottom:14px;}
    .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;}
    .search-wrap input{width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px 10px 38px;font-size:15px;color:var(--text);outline:none;}
    .search-wrap input::placeholder{color:var(--muted);}
    .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none;}
    .chips::-webkit-scrollbar{display:none;}
    .chip{padding:6px 14px;border-radius:999px;font-size:13px;white-space:nowrap;border:0.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;flex-shrink:0;}
    .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;}
    .cards{display:flex;flex-direction:column;gap:10px;}
    .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;}
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
    .card-title{font-size:15px;font-weight:600;line-height:1.3;}
    .card-date{font-size:11px;color:var(--muted);margin-top:3px;}
    .badge{font-size:11px;padding:3px 9px;border-radius:999px;flex-shrink:0;font-weight:500;}
    .card-body{font-size:13px;color:var(--muted);line-height:1.6;}
    .card-full{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;margin-top:8px;font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
    .card-source{font-size:11px;color:var(--accent);margin-top:8px;}
    .card-actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
    .expand-btn{background:none;border:none;color:var(--accent);font-size:12px;padding:5px 0;cursor:pointer;}
    .del-btn{background:rgba(226,75,74,0.12);border:none;color:var(--danger);font-size:12px;padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;}
    .empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;line-height:1.7;}
    .empty-icon{font-size:48px;margin-bottom:12px;}
    .form-section{margin-bottom:18px;}
    .form-label{font-size:13px;color:var(--muted);margin-bottom:8px;display:block;}
    .form-input{width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:15px;color:var(--text);outline:none;font-family:inherit;}
    .form-input:focus{border-color:var(--accent);}
    .form-input::placeholder{color:var(--muted);}
    textarea.form-input{height:120px;resize:vertical;}
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .cat-btn{padding:10px 6px;font-size:13px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--muted);cursor:pointer;text-align:center;}
    .cat-btn.sel{border-color:var(--accent);background:rgba(79,110,247,0.15);color:var(--accent);font-weight:600;}
    .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;margin-top:4px;}
    .submit-btn:active{opacity:0.85;}.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
    .stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;}
    .stat-val{font-size:28px;font-weight:700;}
    .stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;}
    .bar-row{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;}
    .bar-header{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;}
    .bar-count{color:var(--muted);}
    .bar-track{background:var(--surface2);border-radius:999px;height:5px;}
    .bar-fill{height:5px;border-radius:999px;transition:width 0.4s;}
    .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);color:var(--text);font-size:13px;padding:10px 20px;border-radius:var(--radius-sm);opacity:0;transition:all 0.25s;z-index:999;white-space:nowrap;border:0.5px solid var(--border);pointer-events:none;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .pin-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;}
    .pin-logo{width:80px;height:80px;margin-bottom:24px;border-radius:50%;overflow:hidden;}
    .pin-logo img{width:100%;height:100%;object-fit:cover;}
    .pin-title{font-size:22px;font-weight:700;margin-bottom:6px;text-align:center;}
    .pin-sub{font-size:14px;color:var(--muted);margin-bottom:28px;text-align:center;line-height:1.6;}
    .pin-input{width:100%;max-width:300px;padding:13px 16px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);font-size:16px;color:var(--text);outline:none;text-align:center;letter-spacing:2px;margin-bottom:12px;}
    .pin-input:focus{border-color:var(--accent);}
    .pin-btn{width:100%;max-width:300px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:12px;}
    .pin-skip{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:8px;text-decoration:underline;}
    .pin-err{color:var(--danger);font-size:13px;margin-bottom:8px;min-height:18px;}
    .media-links-list{display:flex;flex-direction:column;gap:6px;margin-top:10px;}
    .media-input-row{display:flex;gap:6px;align-items:center;}
    .media-input-row input{flex:1;}
    .media-rm-btn{background:none;border:0.5px solid var(--border);border-radius:var(--radius-sm);color:var(--danger);font-size:16px;padding:6px 10px;cursor:pointer;flex-shrink:0;}
    .add-media-btn{background:none;border:0.5px dashed var(--border);border-radius:var(--radius-sm);color:var(--accent);font-size:13px;padding:10px;width:100%;cursor:pointer;margin-top:6px;}
    .card-media{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
    .media-thumb{width:100%;border-radius:var(--radius-sm);overflow:hidden;border:0.5px solid var(--border);}
    .media-thumb img{width:100%;max-height:220px;object-fit:cover;display:block;}
    .media-thumb iframe{width:100%;height:200px;border:none;display:block;}
    .media-link-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);color:var(--accent);font-size:13px;text-decoration:none;border:0.5px solid var(--border);}
    .media-link-btn span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>

<div id="pin-overlay" class="pin-overlay">
  <div class="pin-logo"><img src="icons/icon-192.png" /></div>
  <div class="pin-title">BMW E36</div>
  <div class="pin-sub">Intră ca administrator pentru a adăuga și edita,<br>sau continuă ca vizitator.</div>
  <input class="pin-input" id="pin-input" type="password" placeholder="Parolă admin" onkeydown="if(event.key==='Enter')tryPin()" />
  <div class="pin-err" id="pin-err"></div>
  <button class="pin-btn" onclick="tryPin()">🔑 Intră ca admin</button>
  <button class="pin-skip" onclick="enterAsGuest()">Continuă ca vizitator →</button>
</div>

<div class="app">
  <div class="header">
    <div class="header-inner">
      <div class="logo"><img src="icons/icon-192.png" /></div>
      <div class="header-text">
        <h1>BMW E36</h1>
        <p id="sync-status">Baza de cunoștințe</p>
      </div>
      <div class="header-btns">
        <button class="icon-btn" onclick="loadEntries()" title="Refresh">🔄</button>
        <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="panel active" id="p-browse">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Caută..." oninput="renderCards()" />
      </div>
      <div class="chips" id="chips"></div>
      <div class="cards" id="cards">
        <div class="empty"><div class="spinner"></div>Se încarcă...</div>
      </div>
    </div>

    <div class="panel" id="p-add">
      <div class="form-section">
        <label class="form-label">Titlu</label>
        <input class="form-input" id="f-title" type="text" placeholder="Ex: Schimb ulei — interval și specificații" />
      </div>
      <div class="form-section">
        <label class="form-label">Categorie</label>
        <div class="cat-grid">
          <button class="cat-btn" onclick="selCat(this,'Motor')">🔧 Motor</button>
          <button class="cat-btn" onclick="selCat(this,'Suspensie')">🚗 Suspensie</button>
          <button class="cat-btn" onclick="selCat(this,'Frâne')">🛑 Frâne</button>
          <button class="cat-btn" onclick="selCat(this,'Transmisie')">⚙️ Transmisie</button>
          <button class="cat-btn" onclick="selCat(this,'Caroserie')">🪟 Caroserie</button>
          <button class="cat-btn" onclick="selCat(this,'Interior')">💺 Interior</button>
          <button class="cat-btn" onclick="selCat(this,'Electric')">⚡ Electric</button>
          <button class="cat-btn" onclick="selCat(this,'Tuning')">🏁 Tuning</button>
          <button class="cat-btn" onclick="selCat(this,'Probleme')">⚠️ Probleme</button>
          <button class="cat-btn" onclick="selCat(this,'Altele')">📌 Altele</button>
        </div>
      </div>
      <div class="form-section">
        <label class="form-label">Detalii</label>
        <textarea class="form-input" id="f-body" placeholder="Descrie problema, soluția, specificațiile tehnice, sfaturi..."></textarea>
      </div>
      <div class="form-section">
        <label class="form-label">Sursă / referință (opțional)</label>
        <input class="form-input" id="f-source" type="text" placeholder="Ex: forum E36, service BMW, manual tehnic..." />
      </div>
      <div class="form-section">
        <label class="form-label">📎 Poze / Video — linkuri (opțional)</label>
        <div class="media-links-list" id="media-links-list"></div>
        <button class="add-media-btn" onclick="addMediaField()">+ Adaugă link (Imgur, YouTube, Google Drive...)</button>
      </div>
      <button class="submit-btn" id="submit-btn" onclick="addEntry()">✓ Salvează în baza de date</button>
    </div>

    <div class="panel" id="p-stats">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Intrări</div></div>
        <div class="stat-card"><div class="stat-val" id="s-cats">0</div><div class="stat-lbl">Categorii</div></div>
        <div class="stat-card"><div class="stat-val" id="s-last" style="font-size:14px;padding-top:4px">—</div><div class="stat-lbl">Ultima</div></div>
      </div>
      <div id="s-bars"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-browse" onclick="goTab('browse')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Explorare
    </button>
    <button class="nav-btn" id="nav-add" onclick="goTab('add')" style="display:none">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Adaugă
    </button>
    <button class="nav-btn" id="nav-stats" onclick="goTab('stats')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Statistici
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://czhfdtsqgbgiggjxstzc.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6aGZkdHNxZ2JnaWdnanhzdHpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzYyNjAsImV4cCI6MjA5MDYxMjI2MH0.BNoIhhhhSpDdmYBNq8sg3dVmcBiU0uv2jePy53lI4IU';
const PW = 'Alexandru98!';

let entries = [];
let selCatVal = '';
let activeFilter = 'all';
let expanded = {};
let isAdmin = false;

async function db(path, opts={}) {
  const r = await fetch(SUPA_URL + '/rest/v1/' + path, {
    headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json', Prefer: 'return=representation', ...opts.headers },
    ...opts
  });
  if (!r.ok) throw new Error(await r.text());
  const t = await r.text();
  return t ? JSON.parse(t) : [];
}

function tryPin() {
  const val = document.getElementById('pin-input').value;
  if (val === PW) {
    isAdmin = true;
    document.getElementById('pin-overlay').style.display = 'none';
    document.getElementById('nav-add').style.display = '';
    loadEntries();
    toast('✓ Bine ai venit, admin!');
  } else {
    document.getElementById('pin-err').textContent = 'Parolă incorectă.';
    document.getElementById('pin-input').value = '';
    setTimeout(() => document.getElementById('pin-err').textContent = '', 2000);
  }
}

function enterAsGuest() {
  isAdmin = false;
  document.getElementById('pin-overlay').style.display = 'none';
  loadEntries();
}

async function loadEntries() {
  setStatus('Se sincronizează...');
  try {
    entries = await db('entries?select=*&order=created_at.desc');
    renderAll();
    setStatus(isAdmin ? '👤 Admin' : '👁 Vizitator');
  } catch(e) {
    setStatus('⚠ Eroare conexiune');
    toast('Nu s-a putut conecta la baza de date.');
  }
}

function setStatus(msg) { document.getElementById('sync-status').textContent = msg; }

async function addEntry() {
  const title = document.getElementById('f-title').value.trim();
  const body = document.getElementById('f-body').value.trim();
  const source = document.getElementById('f-source').value.trim();
  const media = getMediaLinks();
  if (!title) { toast('⚠ Adaugă un titlu!'); return; }
  if (!selCatVal) { toast('⚠ Selectează o categorie!'); return; }
  if (!body) { toast('⚠ Adaugă detalii!'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Se salvează...';
  try {
    await db('entries', { method: 'POST', body: JSON.stringify({ title, body, source: source||null, media: media.length ? media : null, cat: selCatVal, date: new Date().toLocaleDateString('ro-RO') }) });
    document.getElementById('f-title').value = '';
    document.getElementById('f-body').value = '';
    document.getElementById('f-source').value = '';
    clearMediaFields();
    selCatVal = '';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
    toast('✓ Salvat cu succes!');
    goTab('browse');
    loadEntries();
  } catch(e) {
    toast('⚠ Eroare la salvare!');
  } finally {
    btn.disabled = false; btn.textContent = '✓ Salvează în baza de date';
  }
}

async function deleteEntry(id) {
  if (!confirm('Ștergi această intrare?')) return;
  try {
    await db('entries?id=eq.' + id, { method: 'DELETE' });
    entries = entries.filter(e => e.id !== id);
    renderAll(); toast('Șters.');
  } catch(e) { toast('⚠ Eroare la ștergere.'); }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function goTab(name) {
  ['browse','add','stats'].forEach(n => {
    document.getElementById('p-'+n).classList.toggle('active', n===name);
    document.getElementById('nav-'+n).classList.toggle('active', n===name);
  });
  if (name==='stats') renderStats();
}

function selCat(el, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel'); selCatVal = cat;
}

function catColor(cat) {
  const m={Motor:'#4f6ef7',Suspensie:'#3db87a','Frâne':'#e24b4a',Transmisie:'#ef9f27',Caroserie:'#7c5cbf',Interior:'#d4537e',Electric:'#f5a623',Tuning:'#1d9e75',Probleme:'#e24b4a',Altele:'#8888aa'};
  return m[cat]||'#8888aa';
}

function toggleExpand(id) { expanded[id]=!expanded[id]; renderCards(); }
function renderAll() { renderChips(); renderCards(); }

function renderChips() {
  const cats = ['all',...new Set(entries.map(e=>e.cat))];
  document.getElementById('chips').innerHTML = cats.map(c =>
    `<div class="chip ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c==='all'?'Toate':c}</div>`
  ).join('');
}

function setFilter(cat) { activeFilter=cat; renderChips(); renderCards(); }

function renderCards() {
  const q=(document.getElementById('search').value||'').toLowerCase();
  const filtered=entries.filter(e=>(activeFilter==='all'||e.cat===activeFilter)&&(!q||e.title.toLowerCase().includes(q)||e.body.toLowerCase().includes(q)));
  const c=document.getElementById('cards');
  if (!filtered.length) {
    c.innerHTML=`<div class="empty"><div class="empty-icon">${entries.length?'🔍':'🔧'}</div><p>${entries.length?'Nicio intrare găsită.':'Nicio informație adăugată încă.'}</p></div>`;
    return;
  }
  c.innerHTML=filtered.map(e=>{
    const col=catColor(e.cat);
    const isExp=expanded[e.id];
    const short=e.body.length>130?e.body.slice(0,130)+'...':e.body;
    const hasMore=e.body.length>130||(e.media&&e.media.length);
    return `<div class="card">
      <div class="card-top">
        <div style="flex:1"><div class="card-title">${e.title}</div><div class="card-date">${e.date||''}</div></div>
        <span class="badge" style="background:${col}22;color:${col}">${e.cat}</span>
      </div>
      ${isExp?`<div class="card-full">${e.body}</div>`:`<div class="card-body">${short}</div>`}
      ${e.source?`<div class="card-source">📎 ${e.source}</div>`:''}
      ${isExp&&e.media&&e.media.length?renderMedia(e.media):''}
      <div class="card-actions">
        ${hasMore?`<button class="expand-btn" onclick="toggleExpand(${e.id})">${isExp?'▲ Mai puțin':'▼ Mai mult'}</button>`:'<span></span>'}
        ${isAdmin?`<button class="del-btn" onclick="deleteEntry(${e.id})">Șterge</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  document.getElementById('s-total').textContent=entries.length;
  document.getElementById('s-cats').textContent=new Set(entries.map(e=>e.cat)).size;
  document.getElementById('s-last').textContent=entries.length?entries[0].date:'—';
  const bd={};
  entries.forEach(e=>{bd[e.cat]=(bd[e.cat]||0)+1;});
  const sorted=Object.entries(bd).sort((a,b)=>b[1]-a[1]);
  document.getElementById('s-bars').innerHTML=sorted.length?sorted.map(([cat,count])=>{
    const pct=Math.round(count/entries.length*100);
    return`<div class="bar-row"><div class="bar-header"><span>${cat}</span><span class="bar-count">${count} (${pct}%)</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${catColor(cat)}"></div></div></div>`;
  }).join(''):'<div class="empty"><p>Nicio intrare.</p></div>';
}

function addMediaField() {
  const list=document.getElementById('media-links-list');
  const row=document.createElement('div');
  row.className='media-input-row';
  row.innerHTML=`<input class="form-input media-url" type="url" placeholder="https://..." style="font-size:13px;padding:9px 12px"/><button class="media-rm-btn" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(row);
}
function getMediaLinks(){return Array.from(document.querySelectorAll('.media-url')).map(i=>i.value.trim()).filter(Boolean);}
function clearMediaFields(){document.getElementById('media-links-list').innerHTML='';}

function mediaType(url){
  if(/youtube\.com\/watch|youtu\.be\//.test(url))return'youtube';
  if(/\.(jpg|jpeg|png|gif|webp|bmp)(\?|$)/i.test(url)||(/imgur\.com\//.test(url)&&!/\.(mp4|gifv)/.test(url)))return'image';
  if(/\.(mp4|webm|ogg)(\?|$)/i.test(url))return'video';
  return'link';
}
function youtubeId(url){const m=url.match(/(?:v=|youtu\.be\/)([^&?]+)/);return m?m[1]:null;}
function imgurDirect(url){if(/imgur\.com\/[a-zA-Z0-9]+$/.test(url)&&!url.includes('.'))return`https://i.imgur.com/${url.split('/').pop()}.jpg`;return url;}

function renderMedia(links){
  if(!links||!links.length)return'';
  return`<div class="card-media">${links.map(url=>{
    const t=mediaType(url);
    if(t==='youtube'){const id=youtubeId(url);return id?`<div class="media-thumb"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe></div>`:'';};
    if(t==='image')return`<div class="media-thumb"><img src="${imgurDirect(url)}" loading="lazy" onerror="this.parentElement.style.display='none'"/></div>`;
    if(t==='video')return`<div class="media-thumb"><video controls style="width:100%;max-height:220px;display:block"><source src="${url}"></video></div>`;
    const label=url.length>45?url.slice(0,45)+'...':url;
    return`<a class="media-link-btn" href="${url}" target="_blank">🔗 <span>${label}</span></a>`;
  }).join('')}</div>`;
}

function toggleTheme(){
  const isLight=document.documentElement.classList.toggle('light');
  document.getElementById('theme-btn').textContent=isLight?'☀️':'🌙';
  document.querySelector('meta[name="theme-color"]').content=isLight?'#ffffff':'#1a1a2e';
  localStorage.setItem('bmwe36_theme',isLight?'light':'dark');
}
if(localStorage.getItem('bmwe36_theme')==='light'){
  document.documentElement.classList.add('light');
  document.getElementById('theme-btn').textContent='☀️';
  document.querySelector('meta[name="theme-color"]').content='#ffffff';
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
