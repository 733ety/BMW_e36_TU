<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BMW E36" />
  <title>BMW E36 — Baza de cunoștințe</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223a;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0f0f5;
      --text2: #9090a8;
      --text3: #5a5a72;
      --accent: #4e8ef7;
      --accent2: #1a4a99;
      --danger: #e24b4a;
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 16px 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .logo {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { width: 22px; height: 22px; }
    .header-title { font-size: 17px; font-weight: 600; }
    .header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 1;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* CONTENT */
    .content { flex: 1; overflow-y: auto; padding: 16px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* SEARCH */
    .search-box {
      width: 100%;
      padding: 11px 14px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      margin-bottom: 12px;
    }
    .search-box::placeholder { color: var(--text3); }
    .search-box:focus { outline: none; border-color: var(--accent); }

    /* FILTER CHIPS */
    .filter-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
      margin-bottom: 14px;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .chip {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* CARDS */
    .cards { display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .card:active { border-color: var(--border2); transform: scale(0.99); }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .card-title { font-size: 15px; font-weight: 600; line-height: 1.3; }
    .card-meta { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
    .card-body { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text3); font-size: 16px; padding: 2px 4px; line-height: 1;
      border-radius: 4px; flex-shrink: 0;
    }
    .del-btn:active { color: var(--danger); }

    /* EMPTY */
    .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }

    /* FORM */
    .form-section { margin-bottom: 18px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block; }
    .form-input, .form-textarea {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
    .form-textarea { height: 120px; resize: vertical; line-height: 1.6; }

    .cat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .cat-btn {
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 500;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .cat-btn.sel { border-color: var(--accent); background: var(--accent2); color: var(--accent); }
    .cat-btn:active { opacity: 0.7; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }
    .submit-btn:active { opacity: 0.8; transform: scale(0.99); }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; }
    .stat-val { font-size: 26px; font-weight: 700; color: var(--accent); }
    .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; }

    .stat-row { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
    .stat-row-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .stat-row-label { font-size: 13px; font-weight: 500; }
    .stat-row-count { font-size: 12px; color: var(--text2); }
    .progress-bar { height: 4px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.4s; }

    /* DETAIL MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: none;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px 18px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 999px; margin: 0 auto 18px; }
    .modal-cat { margin-bottom: 8px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
    .modal-meta { font-size: 12px; color: var(--text3); margin-bottom: 16px; }
    .modal-body { font-size: 15px; color: var(--text2); line-height: 1.8; white-space: pre-wrap; }
    .modal-source { margin-top: 16px; padding-top: 14px; border-top: 0.5px solid var(--border); font-size: 12px; color: var(--text3); }
    .modal-close {
      width: 100%; margin-top: 18px; padding: 12px;
      background: var(--surface2); color: var(--text2);
      border: 0.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; cursor: pointer;
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2a2a40; color: #fff;
      font-size: 13px; padding: 10px 20px;
      border-radius: var(--radius-sm);
      opacity: 0; transition: all 0.3s;
      z-index: 999; white-space: nowrap;
      border: 0.5px solid var(--border2);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" stroke="white" stroke-width="5"/>
        <rect x="2" y="46" width="96" height="8" rx="2" fill="white"/>
        <rect x="46" y="2" width="8" height="96" rx="2" fill="white"/>
        <circle cx="50" cy="50" r="11" fill="white"/>
      </svg>
    </div>
    <div>
      <div class="header-title">BMW E36</div>
      <div class="header-sub">Baza de cunoștințe</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')">📋 Explorare</button>
    <button class="tab" onclick="switchTab('add')">➕ Adaugă</button>
    <button class="tab" onclick="switchTab('stats')">📊 Statistici</button>
  </div>
</div>

<div class="content">

  <!-- BROWSE -->
  <div class="panel active" id="tab-browse">
    <input class="search-box" type="text" id="search-input" placeholder="🔍 Caută informații..." oninput="renderCards()" />
    <div class="filter-bar" id="filter-bar"></div>
    <div class="cards" id="cards-container"></div>
  </div>

  <!-- ADD -->
  <div class="panel" id="tab-add">
    <div class="form-section">
      <label class="form-label">Titlu</label>
      <input class="form-input" type="text" id="entry-title" placeholder="Ex: Schimb ulei — specificații" />
    </div>
    <div class="form-section">
      <label class="form-label">Categorie</label>
      <div class="cat-grid">
        <button class="cat-btn" onclick="selectCat(this,'Motor')">🔩 Motor</button>
        <button class="cat-btn" onclick="selectCat(this,'Suspensie')">🔧 Suspensie</button>
        <button class="cat-btn" onclick="selectCat(this,'Frâne')">🛑 Frâne</button>
        <button class="cat-btn" onclick="selectCat(this,'Transmisie')">⚙️ Transmisie</button>
        <button class="cat-btn" onclick="selectCat(this,'Caroserie')">🚗 Caroserie</button>
        <button class="cat-btn" onclick="selectCat(this,'Interior')">💺 Interior</button>
        <button class="cat-btn" onclick="selectCat(this,'Electric')">⚡ Electric</button>
        <button class="cat-btn" onclick="selectCat(this,'Tuning')">🏁 Tuning</button>
        <button class="cat-btn" onclick="selectCat(this,'Probleme')">⚠️ Probleme</button>
        <button class="cat-btn" onclick="selectCat(this,'Altele')">📌 Altele</button>
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">Detalii</label>
      <textarea class="form-textarea" id="entry-body" placeholder="Descriere, specificații tehnice, soluții, sfaturi..."></textarea>
    </div>
    <div class="form-section">
      <label class="form-label">Sursă / referință (opțional)</label>
      <input class="form-input" type="text" id="entry-source" placeholder="Forum, manual, service..." />
    </div>
    <button class="submit-btn" onclick="addEntry()">💾 Salvează</button>
  </div>

  <!-- STATS -->
  <div class="panel" id="tab-stats">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-lbl">Total intrări</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-cats">0</div>
        <div class="stat-lbl">Categorii</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-last" style="font-size:13px;padding-top:6px">—</div>
        <div class="stat-lbl">Ultima adăug.</div>
      </div>
    </div>
    <div id="stats-rows"></div>
  </div>

</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-cat" id="modal-cat"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-source" id="modal-source"></div>
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">Închide</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'bmw_e36_v1';
let entries = [];
let selectedCat = '';
let activeFilter = 'all';

function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) entries = JSON.parse(d);
  } catch(e) { entries = []; }
  renderAll();
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(name) {
  const names = ['browse','add','stats'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'stats') renderStats();
}

function selectCat(el, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  selectedCat = cat;
}

function catColor(cat) {
  const m = {
    'Motor':'#1a4a99','Suspensie':'#1a6640','Frâne':'#7a1a1a','Transmisie':'#6a3d0a',
    'Caroserie':'#3a2070','Interior':'#6a1a40','Electric':'#7a5500','Tuning':'#0a5050',
    'Probleme':'#8a2a00','Altele':'#3a3a50'
  };
  return m[cat] || '#3a3a50';
}
function catText(cat) {
  const m = {
    'Motor':'#7ab0ff','Suspensie':'#6ad0a0','Frâne':'#ff8080','Transmisie':'#ffb060',
    'Caroserie':'#aa80ff','Interior':'#ff80b0','Electric':'#ffcc44','Tuning':'#44d0d0',
    'Probleme':'#ff9060','Altele':'#aaaacc'
  };
  return m[cat] || '#aaaacc';
}

function addEntry() {
  const title = document.getElementById('entry-title').value.trim();
  const body = document.getElementById('entry-body').value.trim();
  const source = document.getElementById('entry-source').value.trim();
  if (!title) { toast('⚠️ Adaugă un titlu!'); return; }
  if (!selectedCat) { toast('⚠️ Selectează o categorie!'); return; }
  if (!body) { toast('⚠️ Adaugă detalii!'); return; }

  entries.unshift({ id: Date.now(), title, body, source, cat: selectedCat, date: new Date().toLocaleDateString('ro-RO') });
  save();
  renderAll();

  document.getElementById('entry-title').value = '';
  document.getElementById('entry-body').value = '';
  document.getElementById('entry-source').value = '';
  selectedCat = '';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));

  toast('✅ Informație salvată!');
  switchTab('browse');
}

function deleteEntry(id, e) {
  e.stopPropagation();
  if (!confirm('Ștergi această intrare?')) return;
  entries = entries.filter(x => x.id !== id);
  save();
  renderAll();
  toast('🗑️ Șters.');
}

function openDetail(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('modal-cat').innerHTML = `<span class="badge" style="background:${catColor(e.cat)};color:${catText(e.cat)}">${e.cat}</span>`;
  document.getElementById('modal-title').textContent = e.title;
  document.getElementById('modal-meta').textContent = e.date;
  document.getElementById('modal-body').textContent = e.body;
  document.getElementById('modal-source').textContent = e.source ? '📎 Sursă: ' + e.source : '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

function setFilter(cat) {
  activeFilter = cat;
  renderFilterBar();
  renderCards();
}

function renderAll() {
  renderFilterBar();
  renderCards();
}

function renderFilterBar() {
  const cats = ['all', ...new Set(entries.map(e => e.cat))];
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = cats.map(c => {
    const lbl = c === 'all' ? 'Toate' : c;
    const active = activeFilter === c ? ' active' : '';
    return `<button class="chip${active}" onclick="setFilter('${c}')">${lbl}</button>`;
  }).join('');
}

function renderCards() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  let filtered = entries.filter(e => {
    const matchCat = activeFilter === 'all' || e.cat === activeFilter;
    const matchQ = !q || e.title.toLowerCase().includes(q) || e.body.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  const c = document.getElementById('cards-container');
  if (!filtered.length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">🔧</div><p>${entries.length ? 'Nicio intrare găsită.' : 'Nicio informație adăugată încă.\nMergi la ➕ pentru a adăuga.'}</p></div>`;
    return;
  }

  c.innerHTML = filtered.map(e => {
    const short = e.body.length > 100 ? e.body.slice(0,100) + '...' : e.body;
    return `<div class="card" onclick="openDetail(${e.id})">
      <div class="card-head">
        <div class="card-title">${e.title}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="badge" style="background:${catColor(e.cat)};color:${catText(e.cat)}">${e.cat}</span>
          <button class="del-btn" onclick="deleteEntry(${e.id},event)">✕</button>
        </div>
      </div>
      <div class="card-meta">${e.date}${e.source ? ' · ' + e.source : ''}</div>
      <div class="card-body">${short}</div>
    </div>`;
  }).join('');
}

function renderStats() {
  document.getElementById('stat-total').textContent = entries.length;
  const cats = new Set(entries.map(e => e.cat));
  document.getElementById('stat-cats').textContent = cats.size;
  document.getElementById('stat-last').textContent = entries.length ? entries[0].date : '—';

  const breakdown = {};
  entries.forEach(e => { breakdown[e.cat] = (breakdown[e.cat] || 0) + 1; });
  const sorted = Object.entries(breakdown).sort((a,b) => b[1]-a[1]);
  const total = entries.length || 1;

  const rows = document.getElementById('stats-rows');
  if (!sorted.length) { rows.innerHTML = '<div class="empty"><p>Nicio intrare.</p></div>'; return; }
  rows.innerHTML = sorted.map(([cat, count]) => {
    const pct = Math.round(count / total * 100);
    return `<div class="stat-row">
      <div class="stat-row-head">
        <span class="stat-row-label">${cat}</span>
        <span class="stat-row-count">${count} intrări · ${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

load();
</script>
</body>
</html>
